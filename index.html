<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Websim API Showcase: Comments & Tips</title>
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
    {
      "imports": {
        "marked": "https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js",
        "dompurify": "https://cdn.jsdelivr.net/npm/dompurify/dist/purify.es.min.js"
      }
    }
    </script>
</head>
<body>
    <div id="app">
        <header>
            <div class="project-info">
                <h1 id="project-title">Loading...</h1>
                <p id="creator-info">by <span id="owner-username">...</span></p>
            </div>
            <div class="user-profile">
                <img id="user-avatar" src="" alt="" class="hidden">
                <span id="user-name"></span>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="all">Latest</button>
            <button class="tab-btn" data-tab="best">Best</button>
            <button class="tab-btn" data-tab="tips">Supporters</button>
        </nav>

        <main id="comment-feed">
            <div id="loading-spinner">Fetching the community...</div>
            <div id="comments-container"></div>
            <button id="load-more" class="hidden">Load More</button>
        </main>

        <footer class="interaction-bar">
            <button id="btn-comment" class="action-btn secondary">
                <span>💬</span> Comment
            </button>
            <button id="btn-tip" class="action-btn primary">
                <img src="tip_icon.png" alt="Tip" class="btn-icon"> Support Creator
            </button>
        </footer>

        <!-- Toast Notifications -->
        <div id="toast-container"></div>
    </div>

    <script type="module" src="app.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
